site_name: Sailor Hat WiFi Gateway
site_url: https://docs.hatlabs.fi/sh-wg
site_description: User guide for Sailor Hat WiFi Gateway (SH-wg), an NMEA 2000 to WiFi gateway for marine applications
site_author: Hat Labs

repo_url: https://github.com/hatlabs/SH-wg
repo_name: hatlabs/SH-wg
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/hat_labs_logo.svg
  favicon: assets/hat_labs_logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hatlabs

nav:
  - Introduction: index.md
  - Getting Started: getting-started/index.md
  - Configuration: configuration/index.md
  - Protocols and Data Formats: protocols/index.md
  - Hardware Description: hardware/index.md
  - NMEA Primer: nmea-primer/index.md
  - Specifications: specifications/index.md
  - Hacking: hacking/index.md
  - Support and Warranty: support/index.md
